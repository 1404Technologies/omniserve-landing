<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradient for top cylinder - blue -->
    <linearGradient id="os_l_cylTopBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_l_cylTopCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="50%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Gradient for left cylinder -->
    <linearGradient id="os_l_cylLeftBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="50%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="os_l_cylLeftCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <!-- Gradient for right cylinder -->
    <linearGradient id="os_l_cylRightBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_l_cylRightCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <!-- Gradient for bottom cylinder - teal -->
    <linearGradient id="os_l_cylBottomBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="50%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="os_l_cylBottomCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="50%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <!-- Diagonal node gradients -->
    <linearGradient id="os_l_cylTopLeftBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_l_cylTopLeftCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <linearGradient id="os_l_cylTopRightBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="50%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="os_l_cylTopRightCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="os_l_cylBottomLeftBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="50%" stop-color="#009688"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="os_l_cylBottomLeftCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="50%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#009688"/>
    </linearGradient>
    <linearGradient id="os_l_cylBottomRightBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="50%" stop-color="#00796B"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="os_l_cylBottomRightCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009688"/>
      <stop offset="50%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
    <!-- Line gradients -->
    <linearGradient id="os_l_lineGradTop" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="os_l_lineGradLeft" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_l_lineGradRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_l_lineGradBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="os_l_lineGradTopLeft" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="os_l_lineGradTopRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_l_lineGradBottomLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="os_l_lineGradBottomRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <!-- Center hub gradient -->
    <radialGradient id="os_l_hubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="60%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
    <linearGradient id="os_l_hubRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>
  
  <!-- Connecting lines from center hub to 8 nodes -->
  <!-- Cardinal lines -->
  <line x1="200" y1="155" x2="200" y2="90" stroke="url(#os_l_lineGradTop)" stroke-width="8" stroke-linecap="round"/>
  <line x1="155" y1="200" x2="80" y2="200" stroke="url(#os_l_lineGradLeft)" stroke-width="8" stroke-linecap="round"/>
  <line x1="245" y1="200" x2="320" y2="200" stroke="url(#os_l_lineGradRight)" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="245" x2="200" y2="310" stroke="url(#os_l_lineGradBottom)" stroke-width="8" stroke-linecap="round"/>
  <!-- Diagonal lines -->
  <line x1="168" y1="168" x2="115" y2="115" stroke="url(#os_l_lineGradTopLeft)" stroke-width="6" stroke-linecap="round"/>
  <line x1="232" y1="168" x2="285" y2="115" stroke="url(#os_l_lineGradTopRight)" stroke-width="6" stroke-linecap="round"/>
  <line x1="168" y1="232" x2="115" y2="285" stroke="url(#os_l_lineGradBottomLeft)" stroke-width="6" stroke-linecap="round"/>
  <line x1="232" y1="232" x2="285" y2="285" stroke="url(#os_l_lineGradBottomRight)" stroke-width="6" stroke-linecap="round"/>

  <!-- Center hub - circular design representing unified platform -->
  <circle cx="200" cy="200" r="48" fill="none" stroke="url(#os_l_hubRingGrad)" stroke-width="5"/>
  <circle cx="200" cy="200" r="35" fill="url(#os_l_hubGrad)"/>
  <!-- Inner diamond in center -->
  <polygon points="200,178 222,200 200,222 178,200" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <polygon points="200,186 214,200 200,214 186,200" fill="#0A1F3D"/>

  <!-- Top cylinder (cardinal) -->
  <g transform="translate(200, 65)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#0D47A1"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_l_cylTopBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_l_cylTopCap)"/>
  </g>

  <!-- Left cylinder (cardinal) -->
  <g transform="translate(60, 200)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#0D47A1"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_l_cylLeftBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_l_cylLeftCap)"/>
  </g>

  <!-- Right cylinder (cardinal) -->
  <g transform="translate(340, 200)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#0D47A1"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_l_cylRightBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_l_cylRightCap)"/>
  </g>

  <!-- Bottom cylinder (cardinal - teal) -->
  <g transform="translate(200, 325)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#004D40"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_l_cylBottomBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_l_cylBottomCap)"/>
  </g>

  <!-- Top-Left cylinder (diagonal) -->
  <g transform="translate(100, 100)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#0D47A1"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_l_cylTopLeftBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_l_cylTopLeftCap)"/>
  </g>

  <!-- Top-Right cylinder (diagonal) -->
  <g transform="translate(300, 100)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#0D47A1"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_l_cylTopRightBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_l_cylTopRightCap)"/>
  </g>

  <!-- Bottom-Left cylinder (diagonal - teal) -->
  <g transform="translate(100, 290)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#004D40"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_l_cylBottomLeftBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_l_cylBottomLeftCap)"/>
  </g>

  <!-- Bottom-Right cylinder (diagonal - teal) -->
  <g transform="translate(300, 290)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#004D40"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_l_cylBottomRightBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_l_cylBottomRightCap)"/>
  </g>
</svg>
