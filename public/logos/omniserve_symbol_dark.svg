<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradient for top cylinder - bright blue -->
    <linearGradient id="os_d_cylTopBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="os_d_cylTopCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <!-- Gradient for left cylinder -->
    <linearGradient id="os_d_cylLeftBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_d_cylLeftCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="50%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Gradient for right cylinder -->
    <linearGradient id="os_d_cylRightBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="os_d_cylRightCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="50%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <!-- Gradient for bottom cylinder - teal -->
    <linearGradient id="os_d_cylBottomBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="50%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="os_d_cylBottomCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="50%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <!-- Additional node cylinders for OmniServe hub concept -->
    <linearGradient id="os_d_cylTopLeftBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="50%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_d_cylTopLeftCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="50%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <linearGradient id="os_d_cylTopRightBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="os_d_cylTopRightCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="50%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <linearGradient id="os_d_cylBottomLeftBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="50%" stop-color="#009688"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
    <linearGradient id="os_d_cylBottomLeftCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DB6AC"/>
      <stop offset="50%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="os_d_cylBottomRightBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00796B"/>
      <stop offset="50%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="os_d_cylBottomRightCap" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="50%" stop-color="#4DB6AC"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <!-- Line gradients -->
    <linearGradient id="os_d_lineGradTop" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <linearGradient id="os_d_lineGradLeft" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="os_d_lineGradRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="os_d_lineGradBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="os_d_lineGradTopLeft" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <linearGradient id="os_d_lineGradTopRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="os_d_lineGradBottomLeft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <linearGradient id="os_d_lineGradBottomRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <!-- Center hub gradient -->
    <radialGradient id="os_d_hubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="60%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </radialGradient>
    <linearGradient id="os_d_hubRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="os_d_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Connecting lines from center hub to 8 nodes -->
  <!-- Cardinal lines -->
  <line x1="200" y1="155" x2="200" y2="90" stroke="url(#os_d_lineGradTop)" stroke-width="8" stroke-linecap="round" filter="url(#os_d_glow)"/>
  <line x1="155" y1="200" x2="80" y2="200" stroke="url(#os_d_lineGradLeft)" stroke-width="8" stroke-linecap="round" filter="url(#os_d_glow)"/>
  <line x1="245" y1="200" x2="320" y2="200" stroke="url(#os_d_lineGradRight)" stroke-width="8" stroke-linecap="round" filter="url(#os_d_glow)"/>
  <line x1="200" y1="245" x2="200" y2="310" stroke="url(#os_d_lineGradBottom)" stroke-width="8" stroke-linecap="round" filter="url(#os_d_glow)"/>
  <!-- Diagonal lines -->
  <line x1="168" y1="168" x2="115" y2="115" stroke="url(#os_d_lineGradTopLeft)" stroke-width="6" stroke-linecap="round" filter="url(#os_d_glow)"/>
  <line x1="232" y1="168" x2="285" y2="115" stroke="url(#os_d_lineGradTopRight)" stroke-width="6" stroke-linecap="round" filter="url(#os_d_glow)"/>
  <line x1="168" y1="232" x2="115" y2="285" stroke="url(#os_d_lineGradBottomLeft)" stroke-width="6" stroke-linecap="round" filter="url(#os_d_glow)"/>
  <line x1="232" y1="232" x2="285" y2="285" stroke="url(#os_d_lineGradBottomRight)" stroke-width="6" stroke-linecap="round" filter="url(#os_d_glow)"/>

  <!-- Center hub - circular design representing unified platform -->
  <circle cx="200" cy="200" r="48" fill="none" stroke="url(#os_d_hubRingGrad)" stroke-width="5" filter="url(#os_d_glow)"/>
  <circle cx="200" cy="200" r="35" fill="url(#os_d_hubGrad)" filter="url(#os_d_glow)"/>
  <!-- Inner diamond in center -->
  <polygon points="200,178 222,200 200,222 178,200" fill="none" stroke="#BBDEFB" stroke-width="2.5"/>
  <polygon points="200,186 214,200 200,214 186,200" fill="#64B5F6"/>

  <!-- Top cylinder (cardinal) -->
  <g transform="translate(200, 65)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#1565C0"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_d_cylTopBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_d_cylTopCap)"/>
  </g>

  <!-- Left cylinder (cardinal) -->
  <g transform="translate(60, 200)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#0D47A1"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_d_cylLeftBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_d_cylLeftCap)"/>
  </g>

  <!-- Right cylinder (cardinal) -->
  <g transform="translate(340, 200)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#0D47A1"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_d_cylRightBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_d_cylRightCap)"/>
  </g>

  <!-- Bottom cylinder (cardinal - teal) -->
  <g transform="translate(200, 325)">
    <ellipse cx="0" cy="18" rx="24" ry="9" fill="#004D40"/>
    <rect x="-24" y="-2" width="48" height="20" fill="url(#os_d_cylBottomBody)"/>
    <ellipse cx="0" cy="-2" rx="24" ry="9" fill="url(#os_d_cylBottomCap)"/>
  </g>

  <!-- Top-Left cylinder (diagonal) -->
  <g transform="translate(100, 100)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#1565C0"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_d_cylTopLeftBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_d_cylTopLeftCap)"/>
  </g>

  <!-- Top-Right cylinder (diagonal) -->
  <g transform="translate(300, 100)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#1565C0"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_d_cylTopRightBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_d_cylTopRightCap)"/>
  </g>

  <!-- Bottom-Left cylinder (diagonal - teal) -->
  <g transform="translate(100, 290)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#004D40"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_d_cylBottomLeftBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_d_cylBottomLeftCap)"/>
  </g>

  <!-- Bottom-Right cylinder (diagonal - teal) -->
  <g transform="translate(300, 290)">
    <ellipse cx="0" cy="14" rx="20" ry="7" fill="#004D40"/>
    <rect x="-20" y="-2" width="40" height="16" fill="url(#os_d_cylBottomRightBody)"/>
    <ellipse cx="0" cy="-2" rx="20" ry="7" fill="url(#os_d_cylBottomRightCap)"/>
  </g>
</svg>
